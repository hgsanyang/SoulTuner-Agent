name: CI

on:
  push:
    branches: [main, master, dev, "phase*"]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff Lint Check (whole repo)
        run: |
          ruff check . --output-format=github

      - name: Run Unit Tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # web/package-lock.json is gitignored, so npm cache and `npm ci` are not
      # available on a clean checkout; `npm install` resolves from package.json.
      - name: Install and build frontend
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history for scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
